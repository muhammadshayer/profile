<section class="hero">
  <div class="container">
  </div>
  <div class="hero-image">
    <img src="Pofile-phot.jpeg" alt="Profile Photo" />
  </div>
</section>
 

  <!-- PROJECTS SECTION -->
  <section class="projects">
    <h2>Projects</h2>
    <div class="project-card">
      <h3>MQTT Real-Time Monitoring System</h3>
      <p>Real-time data monitoring using MQTT protocol with .NET backend.</p>
    </div>

    <div class="project-card">
      <h3>Analytics Dashboard</h3>
      <p>Interactive dashboards using Highcharts and .NET APIs.</p>
    </div>

  </section>

  <!-- SKILLS SECTION -->
  <section class="skills">
    <h2>Technical Skills</h2>
    <div class="skill">
      <span>HTML</span>
      <div class="bar"><div class="fill" style="width: 90%"></div></div>
    </div>
    <div class="skill">
      <span>CSS</span>
      <div class="bar"><div class="fill" style="width: 85%"></div></div>
    </div>
    <div class="skill">
      <span>JavaScript</span>
      <div class="bar"><div class="fill" style="width: 80%"></div></div>
    </div>
    <div class="skill">
      <span>TypeScript</span>
      <div class="bar"><div class="fill" style="width: 85%"></div></div>
    </div>
    <div class="skill">
      <span>Angular</span>
      <div class="bar"><div class="fill" style="width: 90%"></div></div>
    </div>
    <div class="skill">
      <span>.NET</span>
      <div class="bar"><div class="fill" style="width: 90%"></div></div>
    </div>
     <div class="skill">
      <span>Flutter</span>
      <div class="bar"><div class="fill" style="width: 90%"></div></div>
    </div>
     <div class="skill">
      <span>React.js</span>
      <div class="bar"><div class="fill" style="width: 90%"></div></div>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact">
    <h2>Contact Me</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" placeholder="Your Name" [(ngModel)]="name" name="name" required />
      <input type="email" placeholder="Your Email" [(ngModel)]="email" name="email" required />
      <textarea placeholder="Your Message" [(ngModel)]="message" name="message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>
